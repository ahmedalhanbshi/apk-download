<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>تحميل التطبيق</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial; margin:0; background:#f6f7fb; color:#111;}
    .wrap{max-width:720px; margin:0 auto; padding:32px 16px;}
    .card{background:#fff; border:1px solid #e7e7ef; border-radius:16px; padding:24px; box-shadow:0 6px 20px rgba(0,0,0,.06)}
    h1{margin:0 0 8px; font-size:28px}
    p{margin:8px 0 0; line-height:1.8; color:#333}
    .btn{display:inline-block; margin-top:16px; padding:12px 18px; border-radius:12px; background:#111; color:#fff; text-decoration:none}
    .note{margin-top:14px; font-size:14px; color:#666}
    .footer{margin-top:16px; font-size:13px; color:#777}
    code{background:#f1f2f6; padding:2px 6px; border-radius:6px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>تحميل تطبيقك</h1>
      <p>اضغط زر التحميل لتثبيت التطبيق على أندرويد.</p>

      <!-- غيّر اسم الملف هنا إذا مختلف -->
      <a class="btn" href="app-release.apk" download>تحميل APK</a>

      <div class="note">
        ملاحظة: قد تحتاج لتفعيل <b>السماح بالتثبيت من مصادر غير معروفة</b> عند التثبيت.
      </div>

      <div class="footer">
        إذا ما بدأ التحميل، افتح الرابط من متصفح كروم على أندرويد.
      </div>
    </div>
  </div>
</body>
</html>
